name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: barichello/godot-ci:4.4.1
    steps:
      - uses: actions/checkout@v4

      - name: Import project (generate .godot cache)
        run: |
          cd godot
          godot --headless --import 2>&1 || true
          # Editor import registers class_names in .godot/ cache

      - name: Run headless test suite
        run: |
          cd godot
          timeout 120 godot --headless --script res://tests/test_runner.gd

  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATES="$HOME/.local/share/godot/export_templates/4.4.1.stable"
          mkdir -p "$TEMPLATES"
          # Copy bundled templates from container image (may be at /root/ if HOME differs)
          cp /root/.local/share/godot/templates/web* "$TEMPLATES/" 2>/dev/null || true
          cp $HOME/.local/share/godot/templates/web* "$TEMPLATES/" 2>/dev/null || true
          # Download if not found
          if [ ! -f "$TEMPLATES/web_template.wasm32.release.wasm" ]; then
            cd "$TEMPLATES"
            wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz -O templates.tpz
            unzip -o templates.tpz
            mv templates/* . 2>/dev/null || true
            rm -rf templates templates.tpz
          fi

      - name: Import project
        run: |
          cd godot
          godot --headless --import 2>&1 || true

      - name: Export Godot to Web
        run: |
          mkdir -p godot/build/web
          cd godot
          godot --headless --export-release "Web" build/web/index.html

      - name: Assemble Pages site
        run: |
          mkdir -p _site/game
          
          # Dashboard at root — index.html + data.json + any dashboard assets
          cp index.html _site/
          cp data.json _site/ 2>/dev/null || echo '{}' > _site/data.json
          
          # Godot web export under /game/
          cp -r godot/build/web/* _site/game/

      - name: Upload combined artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
