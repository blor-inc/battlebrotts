name: Update Dashboard Data

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate data.json from sprint-config + git + API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'SCRIPT'
          import json, re, subprocess, os
          from datetime import datetime, timezone

          def run(cmd):
              return subprocess.check_output(cmd, shell=True, text=True).strip()

          # ── 1. Read sprint-config.json (single source of truth) ──
          with open("sprint-config.json") as f:
              config = json.load(f)

          sprint = config["current"]
          tasks = config.get("tasks", [])
          sprint_history = config.get("history", [])

          # ── 2. Agent roster (static — agents don't change often) ──
          agents = {
              "eric": {"name": "Eric", "title": "🎬 Creative Director", "status": "active", "current": "Creative Director oversight"},
              "the-bott": {"name": "The Bott", "title": "🤖 Head of Product", "status": "active", "current": "Head of Product"},
              "pm": {"name": "Rivett", "title": "📋 Head of Operations", "status": "active", "current": f"Sprint {sprint['number']} coordination"},
              "game-designer": {"name": "Gizmo", "title": "🎯 Game Designer", "status": "idle", "current": "Awaiting next design task"},
              "lead-dev": {"name": "Boltz", "title": "👨‍💻 Lead Dev", "status": "idle", "current": "Awaiting PR reviews"},
              "dev-01": {"name": "Nutts", "title": "💻 Dev-01", "status": "idle", "current": "Awaiting next task"},
              "playtest-lead": {"name": "Optic", "title": "🎮 Playtest Lead", "status": "idle", "current": "Awaiting playable build"},
              "qa": {"name": "Glytch", "title": "🧪 QA", "status": "idle", "current": "Awaiting test tasks"},
              "inspector": {"name": "Specc", "title": "🕵️ Inspector", "status": "idle", "current": "Awaiting audit"},
              "devops": {"name": "Patch", "title": "🔧 DevOps", "status": "working", "current": "S8 Dashboard + CI fixes"},
          }

          # Update agent status based on current tasks
          for t in tasks:
              aid = t.get("assignee", "")
              if aid in agents:
                  if t["status"] == "in-progress":
                      agents[aid]["status"] = "working"
                      agents[aid]["current"] = t["title"]
                  elif t["status"] == "done":
                      agents[aid]["status"] = "active"

          # ── 3. Git commit history → activity feed ──
          # Use %x00 as record separator to handle multi-line commit bodies
          git_log = run("git log --format='%H|%aI|%an|%s%x00%b%x00' -100")
          activity = []
          author_map = {
              'patch': 'devops', 'nutts': 'dev-01', 'boltz': 'lead-dev',
              'glytch': 'qa', 'rivett': 'pm', 'gizmo': 'game-designer',
              'specc': 'inspector', 'optic': 'playtest-lead',
              'eric': 'eric', 'the bott': 'the-bott',
              'studio-lead-dev[bot]': 'lead-dev', 'studio-lead-dev': 'lead-dev',
              'github-actions[bot]': 'devops', 'github-actions': 'devops',
              'patch (bot)': 'devops',
          }

          def resolve_agent(author, body):
              """Resolve agent from Co-authored-by trailer, Agent: line, or commit author."""
              # Check Co-authored-by trailers (agent commits use these)
              for line in body.split('\n'):
                  line = line.strip()
                  if line.lower().startswith('co-authored-by:'):
                      coauthor = line.split(':', 1)[1].strip().lower()
                      name_part = coauthor.split('<')[0].strip()
                      for k, v in author_map.items():
                          if k in name_part:
                              return v
              # Check for "Agent: Name" pattern in PR body
              for line in body.split('\n'):
                  line = line.strip()
                  if line.lower().startswith('agent:'):
                      agent_name = line.split(':', 1)[1].strip().lower()
                      # Remove parenthetical like "(DevOps)" or "(Head of Operations)"
                      agent_name = re.sub(r'\s*\(.*?\)', '', agent_name).strip()
                      for k, v in author_map.items():
                          if k in agent_name:
                              return v
              # Fall back to commit author
              author_lower = author.lower().strip()
              for k, v in author_map.items():
                  if k in author_lower:
                      return v
              return 'unknown'

          # Parse records separated by null bytes
          records = git_log.split('\x00')
          i = 0
          while i < len(records) - 1:
              header = records[i].strip()
              body = records[i + 1].strip() if i + 1 < len(records) else ''
              i += 2
              if not header:
                  continue
              parts = header.split('|', 3)
              if len(parts) == 4:
                  sha, ts, author, msg = parts
                  agent = resolve_agent(author, body)
                  activity.append({
                      "time": ts,
                      "agent": agent,
                      "action": msg[:200],
                      "sha": sha[:8]
                  })

          # ── 4. PR status from GitHub API ──
          prs = []
          try:
              pr_json = run("gh pr list --state all --limit 30 --json number,title,state,author,mergedAt,createdAt,url")
              for pr in json.loads(pr_json):
                  prs.append({
                      "number": pr["number"],
                      "title": pr["title"],
                      "state": pr["state"],
                      "author": pr.get("author", {}).get("login", "unknown"),
                      "mergedAt": pr.get("mergedAt"),
                      "createdAt": pr.get("createdAt"),
                  })
          except Exception as e:
              print(f"Warning: Could not fetch PRs: {e}")

          # ── 5. Count tests ──
          test_count = 0
          try:
              test_files = run("find godot/tests -name 'test_*.gd' -not -name 'test_runner.gd' -not -name 'test_main.gd' 2>/dev/null")
              for tf in test_files.split('\n'):
                  if tf.strip():
                      with open(tf.strip()) as f:
                          test_count += len(re.findall(r'func test_', f.read()))
          except Exception:
              pass

          # ── Build final data.json ──
          data = {
              "sprint": sprint,
              "tasks": tasks,
              "agents": agents,
              "activity": activity,
              "pullRequests": prs,
              "sprintHistory": sprint_history,
              "stats": {
                  "totalTests": test_count,
                  "totalPRs": len(prs),
                  "totalCommits": int(run("git rev-list --count HEAD")),
                  "gdScripts": int(run("find godot -name '*.gd' | wc -l")),
              },
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"✅ data.json generated: Sprint {sprint['number']}, {len(tasks)} tasks, {len(agents)} agents, {len(activity)} commits, {len(prs)} PRs, {test_count} tests, {len(sprint_history)} history entries")
          SCRIPT

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push updated data.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name 'Patch (bot)'
          git config user.email 'patch@blor-inc.studio'
          git add data.json
          git commit -m "chore: auto-update dashboard data.json"
          git push origin main
