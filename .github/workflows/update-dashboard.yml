name: Update Dashboard Data

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log

      - name: Generate data.json from real sources
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'SCRIPT'
          import json, re, subprocess, os
          from datetime import datetime, timezone

          def run(cmd):
              return subprocess.check_output(cmd, shell=True, text=True).strip()

          # ── 1. Parse STATUS.md for sprint info, tasks, agents ──
          with open("STATUS.md") as f:
              content = f.read()

          sprint_match = re.search(r'\*\*Sprint (\d+) — (.+?)\*\*\s*(.*)', content)
          sprint = {
              "number": int(sprint_match.group(1)) if sprint_match else 0,
              "goal": sprint_match.group(2).strip() if sprint_match else "Unknown",
              "status": "complete" if sprint_match and "COMPLETE" in (sprint_match.group(2) + sprint_match.group(3)) else "active"
          }

          # Parse current sprint tasks
          tasks = []
          task_re = re.compile(r'\|\s*(S\d+-\d+)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|')
          in_tasks = False
          for line in content.split('\n'):
              if re.match(r'##\s+Sprint \d+ Tasks', line):
                  in_tasks = True
                  continue
              if in_tasks and line.startswith('## '):
                  break
              m = task_re.match(line)
              if m and in_tasks:
                  raw = m.group(4).strip()
                  status = 'done' if '✅' in raw else 'in-progress' if '🔄' in raw else 'blocked' if '❌' in raw else 'todo'
                  assignee_raw = m.group(3).strip()
                  role_map = {
                      'nutts': 'dev-01', 'patch': 'devops', 'boltz': 'lead-dev',
                      'glytch': 'qa', 'gizmo': 'game-designer', 'rivett': 'pm',
                      'specc': 'inspector', 'optic': 'playtest-lead'
                  }
                  assignee = assignee_raw
                  for name, role in role_map.items():
                      if name.lower() in assignee_raw.lower():
                          assignee = role
                          break
                  tasks.append({
                      "id": m.group(1).strip(),
                      "title": m.group(2).strip(),
                      "assignee": assignee,
                      "status": status
                  })

          # Parse agent status
          agents = {}
          agent_re = re.compile(r'\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|')
          in_agents = False
          agent_info = {
              'Eric': ('eric', '🎬 Creative Director'),
              'The Bott': ('the-bott', '🤖 Head of Product'),
              'Rivett': ('pm', '📋 Head of Operations'),
              'Gizmo': ('game-designer', '🎯 Game Designer'),
              'Boltz': ('lead-dev', '👨‍💻 Lead Dev'),
              'Nutts': ('dev-01', '💻 Dev-01'),
              'Optic': ('playtest-lead', '🎮 Playtest Lead'),
              'Glytch': ('qa', '🧪 QA'),
              'Specc': ('inspector', '🕵️ Inspector'),
              'Patch': ('devops', '🔧 DevOps'),
          }
          for line in content.split('\n'):
              if 'Agent Status' in line:
                  in_agents = True
                  continue
              if in_agents and line.startswith('## '):
                  break
              m = agent_re.match(line)
              if m and in_agents and '---' not in m.group(1) and 'Agent' not in m.group(1):
                  raw_name = re.sub(r'[^\w\s]', '', m.group(1)).strip()
                  status_raw = m.group(2).strip()
                  status = 'active' if '✅' in status_raw else 'working' if '🔄' in status_raw else 'idle' if '⚪' in status_raw else 'unknown'
                  for name, (role_id, title) in agent_info.items():
                      if name.lower() in raw_name.lower():
                          agents[role_id] = {
                              "name": name, "title": title,
                              "status": status, "current": m.group(3).strip()
                          }
                          break

          # ── 2. Git commit history → activity feed ──
          git_log = run("git log --format='%H|%aI|%an|%s' -50")
          activity = []
          for line in git_log.split('\n'):
              if not line.strip():
                  continue
              parts = line.split('|', 3)
              if len(parts) == 4:
                  sha, ts, author, msg = parts
                  author_map = {
                      'patch': 'devops', 'nutts': 'dev-01', 'boltz': 'lead-dev',
                      'glytch': 'qa', 'rivett': 'pm', 'gizmo': 'game-designer',
                      'specc': 'inspector', 'optic': 'playtest-lead'
                  }
                  agent = 'unknown'
                  author_lower = author.lower()
                  for k, v in author_map.items():
                      if k in author_lower:
                          agent = v
                          break
                  activity.append({
                      "time": ts,
                      "agent": agent,
                      "action": msg[:200],
                      "sha": sha[:8]
                  })

          # ── 3. PR status from GitHub API ──
          prs = []
          try:
              pr_json = run("gh pr list --state all --limit 20 --json number,title,state,author,mergedAt,createdAt,url")
              for pr in json.loads(pr_json):
                  prs.append({
                      "number": pr["number"],
                      "title": pr["title"],
                      "state": pr["state"],
                      "author": pr.get("author", {}).get("login", "unknown"),
                      "mergedAt": pr.get("mergedAt"),
                      "createdAt": pr.get("createdAt"),
                  })
          except Exception as e:
              print(f"Warning: Could not fetch PRs: {e}")

          # ── 4. Count tests ──
          test_count = 0
          try:
              test_files = run("find godot/tests -name 'test_*.gd' -not -name 'test_runner.gd' -not -name 'test_main.gd' 2>/dev/null")
              for tf in test_files.split('\n'):
                  if tf.strip():
                      with open(tf.strip()) as f:
                          tc = f.read()
                      test_count += len(re.findall(r'func test_', tc))
          except Exception:
              pass

          # ── 5. Message log activity (if exists) ──
          msg_activity = []
          if os.path.exists("messages/log.md"):
              with open("messages/log.md") as f:
                  for line in f:
                      m = re.match(r'\[(.+?)\]\s+(.+)', line.strip())
                      if m and m.group(1).startswith('20'):
                          msg_activity.append({
                              "time": m.group(1),
                              "entry": m.group(2)[:200]
                          })

          # ── Build final data.json ──
          data = {
              "sprint": sprint,
              "tasks": tasks,
              "agents": agents,
              "activity": activity[:30],
              "pullRequests": prs,
              "messageLog": msg_activity[-20:],
              "stats": {
                  "totalTests": test_count,
                  "totalPRs": len(prs),
                  "totalCommits": int(run("git rev-list --count HEAD")),
                  "gdScripts": int(run("find godot -name '*.gd' | wc -l")),
              },
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"✅ data.json generated: {len(tasks)} tasks, {len(agents)} agents, {len(activity)} commits, {len(prs)} PRs, {test_count} tests")
          SCRIPT

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated data
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto/update-dashboard-data"
          git config user.name 'Patch (bot)'
          git config user.email 'patch@blor-inc.studio'
          
          # Force-update the auto branch
          git checkout -B "$BRANCH"
          git add data.json
          git commit -m "chore: auto-update dashboard data.json"
          git push -f origin "$BRANCH"
          
          # Create or update PR
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open, updated branch"
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "chore: auto-update dashboard data.json" \
              --body "Auto-generated dashboard data from STATUS.md, git history, and GitHub API. Created by update-dashboard workflow."
          fi
