name: Delete Merged Branches

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const protected = ['main', 'develop', 'release'];
            if (protected.includes(branch)) {
              console.log(`Skipping protected branch: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`✅ Deleted branch: ${branch}`);
            } catch (e) {
              console.log(`⚠️ Could not delete ${branch}: ${e.message}`);
            }

  sweep-stale:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and delete merged branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Scanning for merged branches..."
          PROTECTED="main develop release"
          DELETED=0

          for branch in $(git branch -r --merged origin/main | grep -v 'origin/main' | grep -v 'origin/HEAD' | sed 's|origin/||'); do
            # Skip protected branches
            skip=false
            for p in $PROTECTED; do
              if [ "$branch" = "$p" ]; then
                skip=true
                break
              fi
            done
            if [ "$skip" = "true" ]; then
              continue
            fi

            echo "  🗑️  Deleting merged branch: $branch"
            git push origin --delete "$branch" 2>/dev/null && DELETED=$((DELETED + 1)) || echo "    ⚠️ Failed to delete $branch"
          done

          echo ""
          echo "✅ Cleaned up $DELETED merged branches"
