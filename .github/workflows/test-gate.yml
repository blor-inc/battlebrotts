name: Test Gate

on:
  pull_request:
    paths:
      - 'godot/**/*.gd'
      - 'godot/**/*.tscn'
      - 'godot/**/*.tres'
      - 'godot/project.godot'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    steps:
      - uses: actions/checkout@v4

      - name: Import project (generate .godot cache)
        run: |
          cd godot
          godot --headless --import 2>&1 || true

      - name: Run headless test suite
        run: |
          cd godot
          godot --headless --script res://tests/test_runner.gd

  coverage-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check test coverage for changed game scripts
        run: |
          echo "Checking that game scripts have corresponding tests..."

          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- 'godot/game/**/*.gd' 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "✅ No game scripts changed."
            exit 0
          fi

          MISSING=""
          for f in $CHANGED; do
            basename=$(basename "$f" .gd)

            if echo "$f" | grep -q "godot/game/data/"; then
              echo "  ℹ️  $f (data file, skipped)"
              continue
            fi

            test_file="godot/tests/test_${basename}.gd"
            if [ ! -f "$test_file" ]; then
              if grep -rl "\"res://$(echo $f | sed 's|godot/||')\"" godot/tests/ >/dev/null 2>&1; then
                echo "  ✅ $f (tested via import)"
              else
                echo "  ❌ $f — no test file found (expected $test_file)"
                MISSING="$MISSING\n  - $f"
              fi
            else
              echo "  ✅ $f → $test_file"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo ""
            echo "⚠️  The following game scripts lack corresponding test files:"
            echo -e "$MISSING"
            echo ""
            echo "Please add tests in godot/tests/test_<scriptname>.gd"
            exit 1
          fi

          echo ""
          echo "✅ All changed game scripts have tests."
